name: menuverse
description: A futuristic AI-powered restaurant ordering platform.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^13.2.0
  
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  
  # UI & 3D
  model_viewer_plus: ^1.7.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.66.0
  
  # Utils
  url_launcher: ^6.2.5
  qr_code_scanner: ^1.0.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/fonts/
